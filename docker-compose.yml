# ─────────────────────────────────────────────────────────────────────────────
# OpenClaw Autonomous Coding Agent — Docker Compose
#
# Services: openclaw-agent, ollama
# Access: Telegram bot (dmPolicy=pairing — send /start to pair)
# LLM: Ollama (qwen2.5-coder:7b default) | switchable at runtime via Telegram
#
# GPU: to enable GPU acceleration for Ollama, use the override file:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d --build
#   or: make gpu-up
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Ollama (local LLM server) ────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped

    ports:
      - "127.0.0.1:11434:11434"   # accessible on loopback only

    volumes:
      - ollama-data:/root/.ollama

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ── OpenClaw Agent ──────────────────────────────────────────────────────────
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        OPENCLAW_VERSION: ${OPENCLAW_VERSION:-latest}
    image: openclaw-agent:local
    container_name: openclaw-agent
    restart: unless-stopped

    depends_on:
      - ollama

    env_file: .env
    environment:
      OPENCLAW_HOME:          /home/openclaw/.openclaw
      OPENCLAW_STATE_DIR:     /home/openclaw/.openclaw
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:?Set OPENCLAW_GATEWAY_TOKEN in .env}
      NODE_ENV:               production
      # Host path to this repo — set in .env, used by the agent for docker compose commands
      REPO_HOST_PATH:         ${REPO_HOST_PATH:?Set REPO_HOST_PATH in .env (absolute path to this repo on the host)}
      # Ollama config — OLLAMA_MODEL sets default model for coding agents
      OLLAMA_HOST:            http://ollama:11434
      OLLAMA_MODEL:           ${OLLAMA_MODEL:-qwen2.5-coder:7b}

    volumes:
      - openclaw-state:/home/openclaw/.openclaw
      - .:/home/openclaw/repo                      # relative — works on any machine
      - /var/run/docker.sock:/var/run/docker.sock

    # ── Security hardening ─────────────────────────────────────────────────
    user: "10001:10001"
    group_add:
      - "${DOCKER_GID:-999}"   # docker group GID — set DOCKER_GID in .env if not 999
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    deploy:
      resources:
        limits:
          cpus:   "4.0"
          memory: 4096M
        reservations:
          cpus:   "0.25"
          memory: 256M

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

    healthcheck:
      test:         ["CMD-SHELL", "curl -sf http://localhost:18789/ > /dev/null 2>&1 || exit 1"]
      interval:     30s
      timeout:      10s
      retries:      3
      start_period: 90s

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  openclaw-state:
    driver: local
    labels:
      com.openclaw.description: "Agent persistent state: workspace, sessions, memory"

  ollama-data:
    driver: local
    labels:
      com.openclaw.description: "Ollama model weights and config"
