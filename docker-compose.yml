# ─────────────────────────────────────────────────────────────────────────────
# OpenClaw Autonomous Coding Agent — Docker Compose
#
# Services: openclaw-agent, ollama
# Access: Telegram bot (dmPolicy=pairing — send /start to pair)
# LLM: Anthropic Claude Sonnet 4.6 (default) | Gemini | Claude Code | Ollama | Groq
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Ollama (local LLM server) ────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped

    ports:
      - "127.0.0.1:11434:11434"   # accessible on loopback only

    volumes:
      - ollama-data:/root/.ollama

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ── OpenClaw Agent ──────────────────────────────────────────────────────────
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        OPENCLAW_VERSION: ${OPENCLAW_VERSION:-latest}
    image: openclaw-agent:local
    container_name: openclaw-agent
    restart: unless-stopped

    depends_on:
      - ollama

    env_file: .env
    environment:
      OPENCLAW_HOME:          /home/openclaw/.openclaw
      OPENCLAW_STATE_DIR:     /home/openclaw/.openclaw
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:?Set OPENCLAW_GATEWAY_TOKEN in .env}
      NODE_ENV:               production
      # Host path to this repo — needed so docker compose commands resolve paths correctly
      REPO_HOST_PATH:         /home/leonardo/openclaw-docker-agent
      # Ollama config — override OLLAMA_MODEL to change the local model
      OLLAMA_HOST:            http://ollama:11434
      OLLAMA_MODEL:           ${OLLAMA_MODEL:-qwen2.5-coder:7b}
      # Groq config — cloud-hosted QwQ-32B reasoning model
      GROQ_API_KEY:           ${GROQ_API_KEY}
      GROQ_MODEL:             ${GROQ_MODEL:-qwen/qwen3-32b}

    volumes:
      - openclaw-state:/home/openclaw/.openclaw
      - /home/leonardo/openclaw-docker-agent:/home/openclaw/repo
      - /var/run/docker.sock:/var/run/docker.sock

    # ── Security hardening ─────────────────────────────────────────────────
    user: "10001:10001"
    group_add:
      - "999"     # docker group (GID 999) — allows access to /var/run/docker.sock
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    deploy:
      resources:
        limits:
          cpus:   "2.0"
          memory: 2048M
        reservations:
          cpus:   "0.25"
          memory: 256M

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

    healthcheck:
      test:         ["CMD-SHELL", "curl -sf http://localhost:18789/ > /dev/null 2>&1 || exit 1"]
      interval:     30s
      timeout:      10s
      retries:      3
      start_period: 90s

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  openclaw-state:
    driver: local
    labels:
      com.openclaw.description: "Agent persistent state: workspace, sessions, memory"

  ollama-data:
    driver: local
    labels:
      com.openclaw.description: "Ollama model weights and config"
