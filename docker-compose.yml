# ─────────────────────────────────────────────────────────────────────────────
# OpenClaw Autonomous Coding Agent — Docker Compose
#
# Single service: openclaw-agent
# LLM: external Ollama on Windows (LAN) — set OLLAMA_HOST in .env
# Access: Telegram bot (dmPolicy=pairing — send /start to pair)
#
# Prerequisites:
#   - .env file with all required variables (run: python3 scripts/gen-env.py)
#   - Ollama running on Windows LAN machine (see scripts/windows/setup-ollama.ps1)
#   - OLLAMA_HOST set in .env to the Windows machine's URL (e.g. http://192.168.1.100:11434)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── OpenClaw Agent ──────────────────────────────────────────────────────────
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        OPENCLAW_VERSION: ${OPENCLAW_VERSION:-latest}
    image: openclaw-agent:local
    container_name: openclaw-agent
    restart: unless-stopped

    env_file: .env
    environment:
      OPENCLAW_HOME:          /home/openclaw/.openclaw
      OPENCLAW_STATE_DIR:     /home/openclaw/.openclaw
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:?Set OPENCLAW_GATEWAY_TOKEN in .env}
      NODE_ENV:               production
      # Host path to this repo — used by the agent for docker compose commands
      REPO_HOST_PATH:         ${REPO_HOST_PATH:?Set REPO_HOST_PATH in .env (absolute path to this repo on the host)}
      # Ollama on Windows LAN — full URL to the Windows machine
      OLLAMA_HOST:            ${OLLAMA_HOST:?Set OLLAMA_HOST in .env (e.g. http://192.168.1.100:11434)}
      # Brain model — small/fast, used for Telegram chat (must be pulled on Windows)
      BRAIN_MODEL:            ${BRAIN_MODEL:-qwen3:8b}
      # Coding agent model — heavy model used when spawning background agents
      OLLAMA_MODEL:           ${OLLAMA_MODEL:-qwen3-coder:latest}

    volumes:
      - openclaw-state:/home/openclaw/.openclaw
      - .:/home/openclaw/repo                      # relative — works on any machine
      - /var/run/docker.sock:/var/run/docker.sock

    # ── Security hardening ─────────────────────────────────────────────────
    user: "10001:10001"
    group_add:
      - "${DOCKER_GID:-999}"   # docker group GID — set DOCKER_GID in .env if not 999
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    deploy:
      resources:
        limits:
          cpus:   "4.0"
          memory: 4096M
        reservations:
          cpus:   "0.25"
          memory: 256M

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

    healthcheck:
      test:         ["CMD-SHELL", "curl -sf http://localhost:18789/ > /dev/null 2>&1 || exit 1"]
      interval:     30s
      timeout:      10s
      retries:      3
      start_period: 90s

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  openclaw-state:
    driver: local
    labels:
      com.openclaw.description: "Agent persistent state: workspace, sessions, memory"
