# ─────────────────────────────────────────────────────────────────────────────
# OpenClaw Autonomous Coding Agent — Docker Compose
#
# Two services:
#   openclaw  — AI agent (brain: Claude Sonnet via Anthropic API)
#   ollama    — LLM sidecar (cloud models: kimi-k2.5:cloud, glm-5:cloud)
#
# Access: Telegram bot (dmPolicy=pairing — send /start to pair)
#
# Prerequisites:
#   - .env file with all required variables (run: python3 scripts/gen-env.py)
#   - ANTHROPIC_API_KEY in .env (powers the chatbot brain)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── OpenClaw Agent ──────────────────────────────────────────────────────────
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        OPENCLAW_VERSION: ${OPENCLAW_VERSION:-latest}
    image: openclaw-agent:local
    container_name: openclaw-agent
    restart: unless-stopped

    env_file: .env
    environment:
      OPENCLAW_HOME:          /home/openclaw/.openclaw
      OPENCLAW_STATE_DIR:     /home/openclaw/.openclaw
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:?Set OPENCLAW_GATEWAY_TOKEN in .env}
      NODE_ENV:               production
      # Host path to this repo — used by the agent for docker compose commands
      REPO_HOST_PATH:         ${REPO_HOST_PATH:?Set REPO_HOST_PATH in .env (absolute path to this repo on the host)}
      # Coding agent model — Ollama cloud model for spawned coding agents
      OLLAMA_MODEL:           ${OLLAMA_MODEL:-kimi-k2.5:cloud}

    volumes:
      - openclaw-state:/home/openclaw/.openclaw
      - .:/home/openclaw/repo                      # relative — works on any machine
      - /var/run/docker.sock:/var/run/docker.sock

    depends_on:
      - ollama

    # ── Security hardening ─────────────────────────────────────────────────
    user: "10001:10001"
    group_add:
      - "${DOCKER_GID:-999}"   # docker group GID — set DOCKER_GID in .env if not 999
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    deploy:
      resources:
        limits:
          cpus:   "4.0"
          memory: 4096M
        reservations:
          cpus:   "0.25"
          memory: 256M

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

    healthcheck:
      test:         ["CMD-SHELL", "curl -sf http://localhost:18789/ > /dev/null 2>&1 || exit 1"]
      interval:     30s
      timeout:      10s
      retries:      3
      start_period: 90s

  # ── Ollama LLM sidecar ──────────────────────────────────────────────────────
  # Serves Anthropic-compatible /v1/messages API (Ollama >= 0.6).
  # No local model downloads needed — cloud models work out of the box.
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped

    volumes:
      - ollama-data:/root/.ollama

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  openclaw-state:
    driver: local
    labels:
      com.openclaw.description: "Agent persistent state: workspace, sessions, memory"
  ollama-data:
    driver: local
    labels:
      com.openclaw.description: "Ollama model storage"
