# GPU override for Ollama — use with:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d --build
#   or: make gpu-up
#
# Requires:
#   - NVIDIA GPU + drivers on the host
#   - NVIDIA Container Toolkit (Linux) or Docker Desktop with GPU support (Windows WSL2)
#   - On Windows: enable WSL2 CUDA support in Docker Desktop settings

services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
